<html lang="nonurl-friendly">
	<head>
		<meta charset="utf-8">
		<title>simplest-font-reader</title>
	</head>
	<style>
	
	@font-face {
	  font-family: 'Rubik';
	  src: url('Rubik-ExtraBold.ttf') format('truetype')
	  font-weight: normal;
	  font-style: normal;
	  font-display: swap;
	}
	
	html, body {
		font-family: 'Rubik';
		overflow: clip;
		width: 100%;
		height: 100%;
		margin: 0;
		display: flex;
		flex-direction: column;
	}
	
	img, canvas {
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
		background-color: black;
	}
	
	canvas {
		//image-rendering: pixelated; 
		//image-rendering: crisp-edges;
	}
	
	db {
		display: none;
	}
	
	</style>
	<script src="index.js" async="async" defer="defer"></script>
 <body>
	<db>
		<img id="source" src="source.png"></img>
	</db>
	<canvas id="level_canvas_d0" width="800" height="100"></canvas>
 </body>
</html>
