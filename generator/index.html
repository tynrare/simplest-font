<html lang="nonurl-friendly">
	<head>
		<meta charset="utf-8">
		<title>simplest-font-generator</title>
	</head>
	<style>
	
	@font-face {
	  font-family: 'Rubik';
	  src: url('Rubik-ExtraBold.ttf') format('truetype')
	  font-weight: normal;
	  font-style: normal;
	  font-display: swap;
	}
	
	html, body {
		font-family: 'Rubik';
		overflow: clip;
		width: 100%;
		height: 100%;
		margin: 0;
		display: flex;
		flex-direction: column;
	}
	
	img, canvas {
		position: absolute;
		top: 50%;
		left: 50%;
		transform: translate(-50%, -50%);
		background-color: black;
	}
	
	canvas {
		//image-rendering: pixelated; 
		//image-rendering: crisp-edges;
	}
	
	.txt_output {
		line-break: anywhere;
	}
	
	</style>
	<script src="index.js" async="async" defer="defer"></script>
 <body>
	<txt id="txt_output1" class="txt_output">xxx</txt>
	<h3>---</h3>
	<txt id="txt_output2" class="txt_output">xxx</txt>
	<h3>---</h3>
	<txt id="txt_output3" class="txt_output">xxx</txt>
	<h3>---</h3>
	<txt id="txt_output4" class="txt_output">xxx</txt>
	<canvas id="level_canvas_d0" width="4" height="4"></canvas>
 </body>
</html>
